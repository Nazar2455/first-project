<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Переход в приложение</title>
  <script>
    (function () {
      var token = localStorage.getItem('planAuthToken') || '';
      var target = token ? '30d-main-tasks.html' : 'auth.html';
      window.location.replace(target);
    })();
  </script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0f0f1e, #1a0a2e, #16213e);
      color: #eaf2ff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 24px;
    }
    body.light-theme {
      background: linear-gradient(135deg, #f5f8ff, #eef3ff, #e9f0ff);
      color: #1f2a44;
    }
    a {
      color: #ffed4e;
      font-weight: 700;
    }
    .card {
      max-width: 560px;
      padding: 28px;
      border-radius: 16px;
      border: 1px solid rgba(255, 215, 0, 0.35);
      background: rgba(19, 28, 46, 0.88);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }
    body.light-theme .card {
      background: rgba(255, 255, 255, 0.92);
      border-color: rgba(71, 96, 170, 0.25);
      color: #1f2a44;
    }
    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      border: 1px solid rgba(255, 215, 0, 0.45);
      background: rgba(255, 215, 0, 0.12);
      color: #ffed4e;
      font-weight: 700;
    }
  </style>
  <script src="app-settings.js"></script>
  <link rel="stylesheet" href="mobile-responsive.css">
</head>
<body>
  <main class="card">
    <h1 data-i18n="title">Вход в приложение</h1>
    <p data-i18n="desc">Если редирект не сработал автоматически, откройте авторизацию или основной план вручную.</p>
    <a class="btn" href="auth.html" data-i18n="openAuth">Открыть вход</a>
    <a class="btn" href="30d-main-tasks.html" data-i18n="openMain">Открыть основной план</a>
  </main>

  <script>
    const INDEX_I18N = {
      ru: {
        title: 'Вход в приложение',
        desc: 'Если редирект не сработал автоматически, откройте авторизацию или основной план вручную.',
        openAuth: 'Открыть вход',
        openMain: 'Открыть основной план'
      },
      uk: {
        title: 'Вхід у застосунок',
        desc: 'Якщо редирект не спрацював автоматично, відкрий авторизацію або основний план вручну.',
        openAuth: 'Відкрити вхід',
        openMain: 'Відкрити основний план'
      },
      en: {
        title: 'App sign-in',
        desc: 'If redirect did not work automatically, open auth or the main plan manually.',
        openAuth: 'Open sign-in',
        openMain: 'Open main plan'
      }
    };

    window.PlanSettings?.applyThemeClass(document.body);
    window.PlanSettings?.translate(INDEX_I18N);
  </script>
</body>
</html>
