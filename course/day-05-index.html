  <style>
    .easter-egg{background:linear-gradient(135deg,rgba(255,107,107,.15),rgba(255,215,0,.15));border:2px solid rgba(255,107,107,.4);border-radius:12px;padding:20px;margin:15px 0;font-family:'Courier New',monospace;font-size:.9em;line-height:1.4;position:relative;overflow:hidden;animation:easter-glow 3s ease-in-out infinite}
    .easter-egg::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,215,0,.2),transparent);animation:easter-shine 3s infinite;pointer-events:none}
    .easter-egg-content{position:relative;z-index:1}
    .easter-egg-title{color:#ff6b6b;font-weight:800;margin-bottom:10px;font-size:1em}
    .easter-egg-quote{color:#ffd700;font-style:italic;font-weight:600}
    @keyframes easter-glow{0%,100%{box-shadow:0 0 10px rgba(255,107,107,.3)}50%{box-shadow:0 0 20px rgba(255,215,0,.5)}}
    @keyframes easter-shine{0%{left:-100%}50%{left:100%}100%{left:100%}}
